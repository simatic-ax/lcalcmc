# General information
name: "@simatic-ax/lcalcmc"
version: 3.0.0
type: lib

description: Functions to get detailed information about motion profiles.
keywords:
  - library
# Targets to be compiled with 'apax build'
targets:
  - "1500"
  - llvm

#URL to the repository
repository:
  type: git
  url: https://github.com/simatic-ax/lcalcmc

# Registry information, to other npm-registries where Apax packages are located
# '@scope': 'registry-url'
registries:
  '@simatic-ax': 'https://npm.pkg.github.com/'

# The public key(s) to verify dependencies. This ensures, that the package is
# not tampered with.
publicKeys:
  "@simatic-ax":
    "v1": "3792a7e926775425ccdd29ceed8c368c3008b5b33d7d5550b3cb1f58093e1dff"
    "v2": "7af3e394eb2b285a3d99ab8e1f745cc6db75704b30a80393339c721a92ffffd9"

# Catalog:
catalogs:
  "@ax/simatic-ax": ^2510.0.0

# Dependencies
devDependencies:
  "@ax/sdk": ^2510.0.0

# Project variables
variables:
  APAX_BUILD_ARGS:
    - "--debug" # Generate debug information for target "1500"
files:
  - 'README.md'
  - 'LICENSE.md'
  - 'docs'
  - 'bin'
dependencies:
  "@ax/system-fastmath": ^10.2.7

